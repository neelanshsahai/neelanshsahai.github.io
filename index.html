<!DOCTYPE html>
<html>
<style>
body, html {
    height: 100%;
    margin: 0;
}

.bgimg {
    background-image: url('background.png');
    height: 100%;
    background-position: center;
    background-size: cover;
    position: relative;
    color: white;
    -webkit-filter: blur(2px); /* Safari 6.0 - 9.0 */
    filter: blur(2px);
}

.topleft {
    position: absolute;
    top: 0;
    left: 16px;
    font-family: "Courier New", Courier, monospace;
    font-size: 25px;
    color: white;
}

.bottomleft {
    position: absolute;
    bottom: 0;
    font-family: "Courier New", Courier, monospace;
    font-size: 25px;
    left: 16px;
    color: white;
}

.middle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 25px;
    color: white;
}

hr {
    margin: auto;
    width: 40%;
}
</style>
<body>

<div class="bgimg">
</div>
  <div class="topleft">
    <!-- <p>Logo</p> -->
  </div>
  <div class="middle">
    <h1>The site is going under some maintainence due to some minor updates</h1>
    <hr>
    <p>The site will be back by 28th March Midnight</p>
  </div>
  <div class="bottomleft">
    <!-- <p>Some text</p> -->
  </div>

</body>
</html>
